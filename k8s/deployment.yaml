apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  replicas: 2
  selector:
    matchLabels: 
      app: service
  template:
    metadata:
      labels:
        app: deployment
    spec:
      containers:
      - name: exam2026
        image: gcr.io/repaso-examen-500009/my-app
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
          - name: GCP_BUCKET_NAME
            value: "REPLACE_BUCKET_NAME"
        livenessProbe:
          periodSeconds: 10
          httpGet:
            path: /probe
            port: 80


